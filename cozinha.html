<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cozinha - LariUm</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">
<a href="index.html">
<img src="images/logo.png" alt="LariUm">
</a>
</div>

</header>

<section class="secao">

<h1>Cozinha</h1>

<p>
Escolha uma categoria abaixo.
</p>

<div class="hero-tags">

<button class="categoria-btn"
data-categoria="Air Fryers">

Air Fryers

</button>

</div>

</section>

<section class="secao">

<div id="lista-produtos">

<!-- Os botões serão criados aqui -->

</div>

</section>

<script src="cozinha.js"></script>

<script>

const area = document.getElementById("lista-produtos");

const botoes = document.querySelectorAll(".categoria-btn");

botoes.forEach(botao=>{

botao.addEventListener("click",()=>{

botoes.forEach(b=>b.classList.remove("ativo"));

botao.classList.add("ativo");

mostrarCategoria(botao.dataset.categoria);

});

});

function mostrarCategoria(nome){

area.innerHTML="";

const lista=produtos[nome];

if(!lista)return;

lista.forEach(item=>{

const partes=item.split("|");

const titulo=partes[0];

const link=partes[1];

const a=document.createElement("a");

a.href=link;

a.target="_blank";

a.className="produto-btn";

a.textContent=titulo;

area.appendChild(a);

});

}

mostrarCategoria("Air Fryers");

</script>

</body>

</html>
